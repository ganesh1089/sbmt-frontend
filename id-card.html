<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student ID Card</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 380px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.header {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  text-align: center;
  padding: 12px;
}

.header img {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid white;
}

.body {
  display: flex;
  padding: 15px;
  gap: 10px;
}

.photo {
  width: 110px;
  height: 130px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  font-size: 13px;
}

.info p {
  margin: 4px 0;
}

#qrcode {
  display: flex;
  justify-content: center;
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #10b981;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

@media print {
  button { display: none; }
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <img src="./assets/logo.png">
    <h3>SBMT COLLEGE</h3>
    <small>Student ID Card</small>
  </div>

  <div class="body">
    <img id="photo" class="photo">

    <div class="info">
      <p><b id="name">Loading...</b></p>
      <p id="father"></p>
      <p id="class"></p>
      <p id="mobile"></p>
      <p id="admission"></p>
    </div>
  </div>

  <div id="qrcode"></div>

  <button onclick="window.print()">Print / Download</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);

// 🔥 FIXED: NOW USING TOKEN (NOT studentId)
const token = params.get("token");

const API = window.location.origin;

async function loadStudent() {
  try {

    if (!token) {
      alert("Invalid QR Token");
      return;
    }

    const res = await fetch(`${API}/api/qr/student/${token}`);
    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Student not found ❌");
      return;
    }

    // ================= STUDENT DATA =================
    const s = data.student;

    document.getElementById("name").innerText = s?.name || "-";
    document.getElementById("father").innerText = "Father: " + (s?.fatherName || "-");
    document.getElementById("class").innerText = "Class: " + (s?.className || "-");
    document.getElementById("mobile").innerText = "Mobile: " + (s?.mobile || "-");
    document.getElementById("admission").innerText = "Admission: " + (s?.admissionNo || "-");

    // ================= PHOTO =================
    document.getElementById("photo").src =
      s?.photo
        ? `${API}/uploads/${s.photo}`
        : "https://via.placeholder.com/110x130";

    // ================= QR ================

document.getElementById("qrcode").innerHTML = "";

const qrValue = `${window.location.origin}/student-profile.html?token=${s?.qrToken}`;

new QRCode(document.getElementById("qrcode"), {
  text: qrValue,
  width: 100,
  height: 100
});

  } catch (err) {
    console.log(err);
    alert("Server error ❌");
  }
}

loadStudent();

</script>

</body>
</html>

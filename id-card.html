<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student ID Card</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ================= CARD ================= */
.card {
  width: 380px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

/* ================= HEADER ================= */
.header {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  text-align: center;
  padding: 12px;
}

.header img {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid white;
}

/* ================= BODY ================= */
.body {
  display: flex;
  padding: 15px;
  gap: 10px;
}

.photo {
  width: 110px;
  height: 130px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  font-size: 13px;
}

.info p {
  margin: 4px 0;
}

/* ================= QR ================= */
#qrcode {
  display: flex;
  justify-content: center;
  padding: 10px;
}

/* ================= SIGNATURE SECTION ================= */
.sign-section {
  display: flex;
  justify-content: space-between;
  padding: 10px 15px;
  font-size: 12px;
  margin-top: 5px;
}

.sign-box {
  text-align: center;
}

.sign-line {
  width: 120px;
  border-top: 1px solid #000;
  margin-top: 25px;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #10b981;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* ================= PRINT FIX ================= */
@media print {

  body {
    background: white !important;
  }

  .card {
    box-shadow: none !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  button {
    display: none;
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <img src="./assets/logo.png">
    <h3>SBMT COLLEGE</h3>
    <small>Student ID Card</small>
  </div>

  <div class="body">
    <img id="photo" class="photo">

    <div class="info">
      <p><b id="name">Loading...</b></p>
      <p id="father"></p>
      <p id="class"></p>
      <p id="mobile"></p>
      <p id="admission"></p>
    </div>
  </div>

  <div id="qrcode"></div>

  <!-- ================= SIGNATURES ================= -->
  <div class="sign-section">
    
    <div class="sign-box">
      <div class="sign-line"></div>
      <p>HOD Signature</p>
    </div>

    <div class="sign-box">
      <div class="sign-line"></div>
      <p>Principal Signature</p>
    </div>

  </div>

  <button onclick="window.print()">Print / Download</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const API = "https://sbmt-backend.onrender.com";

async function loadStudent() {
  try {
    if (!id) {
      alert("Invalid Student ID ❌");
      return;
    }

    const res = await fetch(`${API}/api/students/id-card/${id}`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.msg || "Student not found ❌");
      return;
    }

    const s = data;

    document.getElementById("name").innerText = s.name;
    document.getElementById("father").innerText = "Father: " + s.fatherName;
    document.getElementById("class").innerText = "Class: " + s.className;
    document.getElementById("mobile").innerText = "Mobile: " + s.mobile;
    document.getElementById("admission").innerText = "Admission: " + s.admissionNo;

    document.getElementById("photo").src =
      s.photo ? `${API}/uploads/${s.photo}` : "https://via.placeholder.com/110x130";

    // ================= QR =================
    document.getElementById("qrcode").innerHTML = "";

const FRONTEND_URL = "https://sbmt-frontend.vercel.app";

const qrValue = `${FRONTEND_URL}/student-profile.html?token=${s.qrToken}`;

new QRCode(document.getElementById("qrcode"), {
  text: qrValue,
  width: 120,
  height: 120
});

  } catch (err) {
    console.log(err);
    alert("Server error ❌");
  }
}

loadStudent();

</script>
</body>
</html>

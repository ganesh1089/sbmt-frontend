<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login - SBMT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #3b82f6, #06b6d4, #8b5cf6, #22c55e);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  animation: float 10s infinite ease-in-out;
}
.bubble:nth-child(1){width:80px;height:80px;left:10%;top:20%;}
.bubble:nth-child(2){width:120px;height:120px;left:70%;top:10%;}
.bubble:nth-child(3){width:60px;height:60px;left:50%;top:70%;}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-30px);}
}

.box {
  width: 360px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  text-align: center;
  color: white;
}

.box img {
  width: 70px;
  margin-bottom: 10px;
}

.box h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.9);
  outline: none;
}

.pass-wrapper {
  position: relative;
}

.pass-wrapper input {
  padding-right: 40px;
}

.pass-wrapper i {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #333;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #22c55e, #3b82f6);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 13px;
}

.notif {
  background: rgba(255,255,255,0.25);
  padding: 8px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="box">

<img src="./assets/logo.png" alt="SBMT">
<h2>Student Login</h2>

<div id="loginNotif" class="notif">Loading notifications...</div>

<!-- ✅ FIXED PLACEHOLDER -->
<input type="text" id="username" placeholder="Enter Username">

<div class="pass-wrapper">
  <input type="password" id="password" placeholder="Enter password">
  <i class="fa-solid fa-eye" onclick="togglePassword()" id="eyeIcon"></i>
</div>

<button onclick="login()">Login</button>

<div class="msg" id="msg"></div>

</div>

<script>
const BACKEND_URL = "https://sbmt-backend.onrender.com";

function togglePassword() {
  const pass = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");

  if (pass.type === "password") {
    pass.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    pass.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
}

// ✅ FINAL FIXED LOGIN
async function login() {
  const username = document.getElementById("username").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (!username || !password) {
    msg.innerText = "Fill all fields!";
    msg.style.color = "#ff4d4d";
    return;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/api/students/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerText = data.message || "Login failed";
      msg.style.color = "#ff4d4d";
      return;
    }

    // 🔥 IMPORTANT FIX (STRUCTURE MATCH)
    localStorage.setItem("student", JSON.stringify(data));

    // 🔥 SESSION TIME SAVE
    localStorage.setItem("loginTime", Date.now());

    msg.innerText = "Login successful ✔";
    msg.style.color = "#00ff99";

    clearInterval(notifInterval);

    setTimeout(() => {
      window.location.href = "studentDashboard.html";
    }, 800);

  } catch (err) {
    msg.innerText = "Server error!";
    msg.style.color = "#ff4d4d";
  }
}

// 🔔 NOTIFICATIONS
let lastSeen = Number(localStorage.getItem("notifSeen")) || 0;
let firstLoad = true;

async function checkNotifications() {
  try {
    const res = await fetch(`${BACKEND_URL}/api/hod/notifications/public`);
    const data = await res.json();

    document.getElementById("loginNotif").innerText =
      data.latest ? "🔔 " + data.latest : "No new notifications";

    if (!firstLoad && data.count > lastSeen) {
      alert("🔔 New Notification Available!");
    }

    firstLoad = false;

  } catch (err) {
    console.log(err);
  }
}

checkNotifications();
let notifInterval = setInterval(checkNotifications, 5000);
</script>

</body>
</html>

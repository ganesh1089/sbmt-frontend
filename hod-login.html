<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOD Login - SBMT</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(-45deg, #b6fbff, #83a4d4, #5f9cff, #c2e9fb);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== LOGIN CARD ===== */
.login-container {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(15px);
  padding: 40px 30px;
  border-radius: 20px;
  width: 320px;

  box-shadow: 
    0 15px 40px rgba(0,0,0,0.3),
    0 0 20px rgba(56,189,248,0.3);

  animation: floatCard 3s ease-in-out infinite;
}

@keyframes floatCard {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

/* ===== LOGO ===== */
.logo {
  display: block;
  margin: 0 auto 15px;
  width: 70px;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #0f172a;
}

.form-group {
  width: 100%;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  outline: none;
  box-sizing: border-box;

  background: rgba(255,255,255,0.7);
  transition: 0.3s;
  padding-right: 40px;
}

input:focus {
  background: white;
  box-shadow: 0 0 10px rgba(56,189,248,0.5);
}

/* ===== LOGIN BUTTON ===== */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;

  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

/* ===== HOME BUTTON FIXED HEADER STYLE ===== */
.home-btn {
  position: fixed;
  top: 15px;
  left: 15px;

  width: 110px;
  height: 38px;

  background: #1565c0;
  color: white;

  border: none;
  border-radius: 8px;

  font-size: 14px;
  font-weight: 500;

  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 2px 8px rgba(0,0,0,0.25);

  transition: 0.25s ease;
  z-index: 1000;
}

.home-btn:hover {
  background: #0d47a1;
  transform: scale(1.05);
}

/* ===== EYE ICON ===== */
#eyeIcon:hover {
  color: #2563eb;
}
  </style>
</head>

<body>

<!-- HOME BUTTON -->
<button onclick="goHome()" class="home-btn">
  ⬅ Home
</button>

<!-- LOGIN CARD -->
<div class="login-container">

  <img src="./assets/logo.png" class="logo" />

  <h2>HOD Login</h2>

  <div class="form-group">
    <input type="text" id="email" placeholder="Enter email" required>
  </div>

  <div class="form-group" style="position:relative;">
    <input type="password" id="password" placeholder="Enter password" required>

    <i class="fa-solid fa-eye" id="eyeIcon" onclick="togglePassword()" style="
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      color:#555;
    "></i>
  </div>

  <button onclick="login()">Login</button>

</div>

<script>
function goHome() {
  window.location.href = "index.html";
}

function togglePassword() {
  const input = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("https://sbmt-backend.onrender.com/api/hod/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok && data.user) {
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = "dashboard.html";
    } else {
      alert(data.message || "Login failed");
    }

  } catch (err) {
    console.log(err);
    alert("Server error");
  }
}
</script>

</body>
</html>
